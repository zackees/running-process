name: Lint Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string

jobs:
  lint:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Lint
        run: uv run --module ci.run_logged logs/lint.log -- uv run --module ci.lint

      - name: Display timeout diagnostics
        if: always()
        shell: bash
        run: |
          if [ -d logs/running-process ]; then
            echo "::warning::Timeout diagnostics detected"
            for f in logs/running-process/*.json; do
              [ -f "$f" ] && echo "--- $f ---" && cat "$f"
            done
          fi

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-lint-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
