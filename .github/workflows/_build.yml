name: Build Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      artifact-name:
        required: false
        type: string
        default: ""
      build-mode:
        required: false
        type: string
        default: "dev"
      include-sdist:
        required: false
        type: boolean
        default: false
      include-crates:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      build-mode:
        description: "Build mode (dev or release)"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - release

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "1"
      RUNNING_PROCESS_FORCE_SOLDR: soldr
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      - name: Setup soldr
        uses: zackees/setup-soldr@main
        with:
          toolchain: "1.94.1"
          cache-key-suffix: ${{ inputs.runs-on }}

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Build wheel (${{ inputs.build-mode || 'dev' }})
        run: uv run --module ci.run_logged logs/build-wheel.log -- uv run --module ci.build_wheel --${{ inputs.build-mode || 'dev' }}

      - name: Build sdist
        if: ${{ inputs.include-sdist }}
        run: uv run maturin sdist --out dist

      - name: Upload dist artifacts
        if: ${{ inputs.artifact-name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/*
          if-no-files-found: error

      - name: Package Rust crates
        if: ${{ inputs.include-crates }}
        run: |
          soldr cargo package -p running-process-core --no-verify
          soldr cargo package -p running-process-py --no-verify || echo "::warning::running-process-py packaging skipped (running-process-core not yet on crates.io)"

      - name: Upload crate artifacts
        if: ${{ inputs.include-crates }}
        uses: actions/upload-artifact@v4
        with:
          name: crates
          path: target/package/*.crate
          if-no-files-found: warn

      # ── zccache-daemon orphan workaround ─────────────────────────────
      # Imported verbatim from zackees/zccache PR #299 — the same hack
      # the zccache repo uses in `.github/actions/build-target/action.yml`.
      #
      # setup-soldr currently ships a managed zccache binary built from a
      # pre-#291 release whose `spawn_daemon` path inherits the parent's
      # inheritable handles via `CreateProcessW(bInheritHandles=TRUE)`.
      # The daemon survives a graceful `zccache stop` (a new daemon
      # respawns on connection, or a child holds the IPC handle), and on
      # Windows it can hold file locks long enough to hang the build
      # itself or break `actions/upload-artifact`. Symptoms locally and
      # on Windows runners include:
      #
      #   soldr: zccache session-start ... failed:
      #          zccache: lost connection to daemon (no response received)
      #
      # The force-kill below guarantees zero `zccache-daemon` processes
      # at end-of-job. `if: always()` so it runs even on build failure.
      #
      # Remove this block once setup-soldr bumps its managed zccache to
      # >= 1.7.0 (which includes the PROC_THREAD_ATTRIBUTE_HANDLE_LIST
      # fix from zccache#291). Tracked locally as a follow-up issue;
      # zccache-side tracker is zackees/zccache#299.
      - name: Shutdown zccache daemon before cache save
        if: always()
        shell: bash
        run: |
          zccache stop || true
          case "$RUNNER_OS" in
            Windows)
              taskkill //F //IM zccache-daemon.exe //T 2>/dev/null || true
              ;;
            Linux|macOS)
              pkill -KILL -x zccache-daemon 2>/dev/null || true
              ;;
          esac

      - name: Display failure diagnostics
        if: ${{ failure() || cancelled() }}
        shell: bash
        run: |
          if ls logs/*.analytics.json >/dev/null 2>&1; then
            echo "::warning::Failure analytics detected"
            for f in logs/*.analytics.json; do
              [ -f "$f" ] && echo "--- $f ---" && cat "$f"
            done
          fi
          if [ -d logs/running-process ]; then
            echo "::warning::running-process diagnostics detected"
            for f in logs/running-process/*; do
              [ -f "$f" ] || continue
              case "$f" in
                *.json)
                  echo "--- $f ---"
                  cat "$f"
                  ;;
                *.log)
                  echo "--- $f (tail -200) ---"
                  tail -n 200 "$f"
                  ;;
              esac
            done
          fi
          echo "::group::Rust toolchain diagnostics"
          command -v rustup >/dev/null 2>&1 && rustup show || true
          command -v rustup >/dev/null 2>&1 && rustup toolchain list || true
          command -v rustc >/dev/null 2>&1 && rustc -Vv || true
          command -v cargo >/dev/null 2>&1 && cargo -V || true
          command -v cargo-clippy >/dev/null 2>&1 && cargo-clippy -V || true
          command -v soldr >/dev/null 2>&1 && soldr version || true
          echo "::endgroup::"

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-build-${{ inputs.artifact-name || inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
