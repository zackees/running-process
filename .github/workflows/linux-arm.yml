name: Linux ARM

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      build_dist:
        description: Build and upload distribution artifacts
        required: false
        default: "false"
      run_tests:
        description: Run lint and test suite
        required: false
        default: "true"

jobs:
  call:
    uses: ./.github/workflows/_platform-ci.yml
    with:
      runs-on: ubuntu-24.04-arm
      artifact-name: wheels-linux-arm
      build-dist: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_dist == 'true' }}
      run-tests: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_tests != 'false' }}
