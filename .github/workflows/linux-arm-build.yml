name: Linux ARM Build

# Manual wheel-collection entry point only (ci/publish.py fallback).
# Push/PR builds are covered by the consolidated CI Preflight
# workflows (ci-linux/ci-macos/ci-windows -> ci-preflight.yml),
# and release wheels by auto-release.yml.
on:
  workflow_dispatch:
    inputs:
      build-mode:
        description: "Build mode"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - release

jobs:
  call:
    uses: ./.github/workflows/_build.yml
    with:
      runs-on: ubuntu-24.04-arm
      artifact-name: wheels-linux-arm
      build-mode: ${{ inputs.build-mode || 'dev' }}
