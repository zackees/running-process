[package]
name = "running-process"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Subprocess and PTY runtime for the running-process project"

[features]
# Wave 2/9 of #165: feature scaffolding for the upcoming mono-crate
# consolidation. Subsequent waves (W3-W6) merge the proto / client /
# daemon / trampoline crates into this one and switch these features
# on. Final feature scheme is documented in #165.
#
# `default` will become `["client"]` once Wave 4 lands and populates
# the `client` feature with its actual dep list (per Q1 resolution in
# #165). For now `default` stays `[]` so this wave is a pure no-op
# diff at the dep-graph level.
default = []
core = []                       # always-available API; placeholder marker
client = []                     # populated by Wave 4 (#169)
daemon = ["client"]             # populated by Wave 5 (#170)
originator-scan = []            # used by running-process-py for cwd-tagging

[dependencies]
libc = "0.2"
portable-pty = "0.9"
sysinfo = "0.30"
thiserror = { workspace = true }
winapi = { version = "0.3", features = ["errhandlingapi", "fileapi", "handleapi", "ioapiset", "jobapi2", "namedpipeapi", "processthreadsapi", "winnt", "minwindef", "windef", "winuser", "consoleapi", "processenv", "synchapi", "winbase", "wincon", "tlhelp32"] }
# Wave 3 of #165: proto types absorbed from the former
# `running-process-proto` crate. Unconditional today; Wave 4 will
# move these behind `feature = "client"` along with the rest of the
# IPC subsystem.
prost = "0.14"
prost-types = "0.14"

[build-dependencies]
# Wave 3 of #165: build.rs absorbed from `running-process-proto`.
# Compiles proto/daemon.proto into OUT_DIR.
prost-build = "0.14"
protox = "0.9"

[dev-dependencies]
serde_json = "1"
tempfile = "3"
test-watchdog = { path = "../test-watchdog" }
