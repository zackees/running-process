name: Build Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      artifact-name:
        required: false
        type: string
        default: ""
      build-mode:
        required: false
        type: string
        default: "dev"
      include-sdist:
        required: false
        type: boolean
        default: false
      include-crates:
        required: false
        type: boolean
        default: false
      sidecar-manifest-artifact:
        # #447: name of an actions/upload-artifact artifact containing
        # `conpty-sidecar.sha256.toml`. When set, that file is copied
        # to the workspace root before the wheel build so build.rs
        # bakes the per-arch SHAs into the compiled crate. The default
        # empty string preserves the existing dev/CI behavior (an
        # empty manifest → runtime falls back to fetch-without-verify
        # with a single diagnostic line).
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      build-mode:
        description: "Build mode (dev or release)"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - release

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "full"
      RUST_LIB_BACKTRACE: "full"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ inputs.runs-on }}-${{ inputs.build-mode || 'dev' }}
          cache-on-failure: true

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      # #447: pull the ConPTY sidecar SHA manifest staged by the caller
      # workflow's `build-sidecars` job so build.rs bakes the per-arch
      # SHAs into the wheel. No-op when the input is empty (CI / local
      # use), where the placeholder manifest in the repo root applies.
      - name: Stage sidecar manifest at workspace root
        if: ${{ inputs.sidecar-manifest-artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.sidecar-manifest-artifact }}
          path: sidecar-in

      - name: Copy sidecar manifest into place
        if: ${{ inputs.sidecar-manifest-artifact != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cp sidecar-in/conpty-sidecar.sha256.toml ./conpty-sidecar.sha256.toml
          echo "Manifest staged for wheel build:"
          cat ./conpty-sidecar.sha256.toml

      - name: Build wheel (${{ inputs.build-mode || 'dev' }})
        run: uv run --no-sync --module ci.run_logged logs/build-wheel.log -- uv run --no-sync --module ci.build_wheel --${{ inputs.build-mode || 'dev' }}

      # Backend smoke: exercise the soldr PEP 517 backend end-to-end
      # (isolated build env, soldr resolved from PyPI, RUSTC_WRAPPER
      # compile through the soldr daemon). Linux-only for now: soldr's
      # compile daemon does not start on hosted macOS/Windows runners
      # (zackees/soldr#1300) and no intel-mac soldr wheel is published,
      # so the other lanes run with `uv run --no-sync` and never invoke
      # the backend.
      - name: soldr PEP 517 backend smoke
        if: ${{ runner.os == 'Linux' }}
        run: uv build --wheel --out-dir dist-backend-smoke

      - name: Build sdist
        if: ${{ inputs.include-sdist }}
        run: uv run --no-sync maturin sdist --out dist

      - name: Upload dist artifacts
        if: ${{ inputs.artifact-name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/*
          if-no-files-found: error

      - name: Package Rust crates
        if: ${{ inputs.include-crates }}
        run: |
          cargo package -p running-process --no-verify
          cargo package -p running-process-py --no-verify || echo "::warning::running-process-py packaging skipped (running-process not yet on crates.io)"

      - name: Upload crate artifacts
        if: ${{ inputs.include-crates }}
        uses: actions/upload-artifact@v4
        with:
          name: crates
          path: target/package/*.crate
          if-no-files-found: warn

      - name: Display failure diagnostics
        if: ${{ failure() || cancelled() }}
        shell: bash
        run: |
          if ls logs/*.analytics.json >/dev/null 2>&1; then
            echo "::warning::Failure analytics detected"
            for f in logs/*.analytics.json; do
              [ -f "$f" ] && echo "--- $f ---" && cat "$f"
            done
          fi
          if [ -d logs/running-process ]; then
            echo "::warning::running-process diagnostics detected"
            for f in logs/running-process/*; do
              [ -f "$f" ] || continue
              case "$f" in
                *.json)
                  echo "--- $f ---"
                  cat "$f"
                  ;;
                *.log)
                  echo "--- $f (tail -200) ---"
                  tail -n 200 "$f"
                  ;;
              esac
            done
          fi
          echo "::group::Rust toolchain diagnostics"
          command -v rustup >/dev/null 2>&1 && rustup show || true
          command -v rustup >/dev/null 2>&1 && rustup toolchain list || true
          command -v rustc >/dev/null 2>&1 && rustc -Vv || true
          command -v cargo >/dev/null 2>&1 && cargo -V || true
          command -v cargo-clippy >/dev/null 2>&1 && cargo-clippy -V || true
          echo "::endgroup::"

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-build-${{ inputs.artifact-name || inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
