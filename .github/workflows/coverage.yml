name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo
      RUSTUP_HOME: ${{ github.workspace }}/.rustup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync
        run: uv sync --group dev

      - name: Install Toolchain
        run: uv run --module ci.run_logged logs/install.log -- uv run --script install

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: running-process-ubuntu-24.04

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: uv run --module ci.test --coverage

      - name: Upload Python coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python
          path: coverage-python.xml
          if-no-files-found: warn

      - name: Upload Rust coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-rust
          path: coverage-rust.lcov
          if-no-files-found: warn

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage-python.xml,coverage-rust.lcov
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-coverage
          path: logs/*
          if-no-files-found: warn
