name: Integration Test Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string

jobs:
  integration-test:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "1"
      RUNNING_PROCESS_LIVE_TESTS: "1"
      RUNNING_PROCESS_GH_PTY_TESTS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      - name: Setup zccache
        uses: zackees/zccache@main
        with:
          shared-key: ${{ inputs.runs-on }}
          cache-compilation: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
          # target metadata is reused across workflows for the same commit key,
          # which can restore stale Rust fingerprints into later jobs.
          cache-target: "false"
          save-cache: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}

      - name: Reset pinned Rust toolchain on macOS ARM
        if: ${{ runner.os == 'macOS' && runner.arch == 'ARM64' }}
        shell: bash
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            exit 0
          fi
          rustup toolchain list | awk '$1 ~ /^1\.94\.1/ {print $1}' | while read -r toolchain; do
            [ -n "$toolchain" ] || continue
            echo "Removing stale toolchain: $toolchain"
            rustup toolchain uninstall "$toolchain" || true
          done

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Dev build
        run: uv run --module ci.run_logged logs/dev-build.log -- uv run --module ci.build_wheel --dev

      - name: Integration Tests
        env:
          IN_RUNNING_PROCESS: running-process-cli
        run: uv run --module ci.run_logged logs/integration-test.log -- uv run pytest -m live -ra --strict-markers

      - name: Display failure diagnostics
        if: ${{ failure() || cancelled() }}
        shell: bash
        run: |
          if ls logs/*.analytics.json >/dev/null 2>&1; then
            echo "::warning::Failure analytics detected"
            for f in logs/*.analytics.json; do
              [ -f "$f" ] && echo "--- $f ---" && cat "$f"
            done
          fi
          if [ -d logs/running-process ]; then
            echo "::warning::running-process diagnostics detected"
            for f in logs/running-process/*; do
              [ -f "$f" ] || continue
              case "$f" in
                *.json)
                  echo "--- $f ---"
                  cat "$f"
                  ;;
                *.log)
                  echo "--- $f (tail -200) ---"
                  tail -n 200 "$f"
                  ;;
              esac
            done
          fi
          echo "::group::Rust toolchain diagnostics"
          command -v rustup >/dev/null 2>&1 && rustup show || true
          command -v rustup >/dev/null 2>&1 && rustup toolchain list || true
          command -v rustc >/dev/null 2>&1 && rustc -Vv || true
          command -v cargo >/dev/null 2>&1 && cargo -V || true
          command -v cargo-clippy >/dev/null 2>&1 && cargo-clippy -V || true
          echo "::endgroup::"

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-integration-test-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn

      - name: Cleanup zccache
        if: always()
        uses: zackees/zccache/action/cleanup@main
