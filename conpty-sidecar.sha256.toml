# Per-arch SHA-256 hashes of the conpty-sidecar-<arch>.tar.zst assets attached
# to the matching GitHub release.
#
# Generated by the CI step in .github/workflows/auto-release.yml that builds
# the tarballs. The release workflow overwrites this file in-place before the
# crate is built so that `build.rs` bakes the just-published hashes into the
# crate that goes out in the same workflow run.
#
# The file ships commented-out in source checkouts so dev builds compile
# without a hash table. The runtime treats absence of an arch entry as
# "skip verification" rather than failing closed (see #447 acceptance
# criteria and docs/v1-dependency-surface.md).
#
# When the workflow writes this file at release time it replaces the entire
# contents — the comments above are not preserved across releases.

# [asset.x64]
# sha256 = "..."
# size_bytes = 0
#
# [asset.arm64]
# sha256 = "..."
# size_bytes = 0
#
# [asset.x86]
# sha256 = "..."
# size_bytes = 0
#
# [asset.arm]
# sha256 = "..."
# size_bytes = 0
