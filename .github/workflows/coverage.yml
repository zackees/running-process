name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo
      RUSTUP_HOME: ${{ github.workspace }}/.rustup
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-ubuntu-24.04-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-ubuntu-24.04-py3.11-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set Rust toolchain env
        shell: bash
        run: echo "RUSTUP_TOOLCHAIN=$(grep '^channel' rust-toolchain.toml | sed 's/.*= *\"\(.*\)\"/\1/')" >> "$GITHUB_ENV"

      - name: Sync
        run: uv sync --frozen --group dev

      - name: Install Toolchain
        run: uv run --module ci.run_logged logs/install.log -- uv run --script install

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: running-process-ubuntu-24.04
          cache-targets: false

      - name: Dev build
        run: uv run --module ci.run_logged logs/dev-build.log -- uv run --module ci.build_wheel --dev

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: uv run --module ci.test --coverage

      - name: Upload Python coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python
          path: coverage-python.xml
          if-no-files-found: warn

      - name: Upload Rust coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-rust
          path: coverage-rust.lcov
          if-no-files-found: warn

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage-python.xml,coverage-rust.lcov
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Display timeout diagnostics
        if: always()
        shell: bash
        run: |
          if [ -d logs/running-process ]; then
            echo "::warning::Timeout diagnostics detected"
            for f in logs/running-process/*.json; do
              [ -f "$f" ] && echo "--- $f ---" && cat "$f"
            done
          fi

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-coverage
          path: logs/*
          if-no-files-found: warn
