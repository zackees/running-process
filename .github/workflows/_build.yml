name: Build Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      artifact-name:
        required: false
        type: string
        default: ""
      build-mode:
        required: false
        type: string
        default: "dev"
      include-sdist:
        required: false
        type: boolean
        default: false
      include-crates:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      build-mode:
        description: "Build mode (dev or release)"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - release

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      - name: Setup zccache
        uses: zackees/zccache@main
        with:
          shared-key: ${{ inputs.runs-on }}
          cache-compilation: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
          cache-target: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
          save-cache: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Build wheel (${{ inputs.build-mode || 'dev' }})
        run: uv run --module ci.run_logged logs/build-wheel.log -- uv run --module ci.build_wheel --${{ inputs.build-mode || 'dev' }}

      - name: Build sdist
        if: ${{ inputs.include-sdist }}
        run: uv run maturin sdist --out dist

      - name: Upload dist artifacts
        if: ${{ inputs.artifact-name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/*
          if-no-files-found: error

      - name: Package Rust crates
        if: ${{ inputs.include-crates }}
        run: |
          uvx soldr cargo package -p running-process-core --no-verify
          uvx soldr cargo package -p running-process-py --no-verify || echo "::warning::running-process-py packaging skipped (running-process-core not yet on crates.io)"

      - name: Upload crate artifacts
        if: ${{ inputs.include-crates }}
        uses: actions/upload-artifact@v4
        with:
          name: crates
          path: target/package/*.crate
          if-no-files-found: warn

      - name: Display timeout diagnostics
        if: always()
        shell: bash
        run: |
          if ls logs/*.analytics.json >/dev/null 2>&1; then
            echo "::warning::Failure analytics detected"
            for f in logs/*.analytics.json; do
              [ -f "$f" ] && echo "--- $f ---" && cat "$f"
            done
          fi
          if [ -d logs/running-process ]; then
            echo "::warning::Timeout diagnostics detected"
            for f in logs/running-process/*.json; do
              [ -f "$f" ] && echo "--- $f ---" && cat "$f"
            done
          fi

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-build-${{ inputs.artifact-name || inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn

      - name: Cleanup zccache
        if: always()
        uses: zackees/zccache/action/cleanup@main
