name: Unit Test Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string

jobs:
  unit-test:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      # Full diagnostics on CI: capture every frame on panic and tell
      # cargo test to forward println!/eprintln! through (`--nocapture`)
      # so a hung or panicking Rust test leaves a usable trail. NOTE:
      # we do NOT set RUST_LOG=debug — uv (a Rust binary itself) and
      # other tooling we shell out to in pytest will start dumping
      # tracing output into captured stdout and break assertions that
      # compare against fixed expected strings.
      RUST_BACKTRACE: "full"
      RUST_LIB_BACKTRACE: "full"
      RUNNING_PROCESS_TEST_NOCAPTURE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      # cargo-nextest gives us per-test process isolation and a hard
      # per-test wall-clock kill (see .config/nextest.toml). Prebuilt
      # binary install is sub-second compared with `cargo install`.
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ inputs.runs-on }}-unit
          cache-on-failure: true

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Dev build
        run: uv run --module ci.run_logged logs/dev-build.log -- uv run --module ci.build_wheel --dev

      - name: Unit Tests
        run: uv run --module ci.run_logged logs/test.log -- uv run --module ci.test

      - name: Display failure diagnostics
        if: ${{ failure() || cancelled() }}
        shell: bash
        run: |
          if ls logs/*.analytics.json >/dev/null 2>&1; then
            echo "::warning::Failure analytics detected"
            for f in logs/*.analytics.json; do
              [ -f "$f" ] && echo "--- $f ---" && cat "$f"
            done
          fi
          if [ -d logs/running-process ]; then
            echo "::warning::running-process diagnostics detected"
            for f in logs/running-process/*; do
              [ -f "$f" ] || continue
              case "$f" in
                *.json)
                  echo "--- $f ---"
                  cat "$f"
                  ;;
                *.log)
                  echo "--- $f (tail -200) ---"
                  tail -n 200 "$f"
                  ;;
              esac
            done
          fi
          echo "::group::Rust toolchain diagnostics"
          command -v rustup >/dev/null 2>&1 && rustup show || true
          command -v rustup >/dev/null 2>&1 && rustup toolchain list || true
          command -v rustc >/dev/null 2>&1 && rustc -Vv || true
          command -v cargo >/dev/null 2>&1 && cargo -V || true
          command -v cargo-clippy >/dev/null 2>&1 && cargo-clippy -V || true
          echo "::endgroup::"

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-unit-test-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
