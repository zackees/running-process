name: Linux ARM Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      build-mode:
        description: "Build mode"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - release

jobs:
  call:
    uses: ./.github/workflows/_build.yml
    with:
      runs-on: ubuntu-24.04-arm
      artifact-name: wheels-linux-arm
      build-mode: ${{ inputs.build-mode || 'dev' }}
