name: Linux x86 Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      build-mode:
        description: "Build mode"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - release

jobs:
  call:
    uses: ./.github/workflows/_build.yml
    with:
      runs-on: ubuntu-24.04
      artifact-name: wheels-linux-x86
      build-mode: ${{ inputs.build-mode || 'dev' }}
      include-sdist: true
      include-crates: true
